  =====================================================================
  GET STRONG · FREE FIRST CLASS — real booking snippet (drop-in)
  =====================================================================

  Implements the Claude Design "Good Moves Booking" flow 1:1 on top of
  the real backend. The page's "book your free first class" CTA opens
  a full-screen (mobile) / centered (desktop) sheet:

    LOADING  · skeleton day tiles + class cards
    SCHEDULE · next 14 days as day tiles (full days dashed/disabled),
               class cards with teacher, language tag, scarcity pill,
               fully-booked cards, empty-day state with jump-to-next-day
    REGISTER · chosen class summary, per-field validation, error banner
               with retry, returning-customer notice (deep blue card)
    DONE     · celebration block, personalized title, .ics download,
               account+email line, address card with directions

  How to integrate (2 steps, no design changes)
  ---------------------------------------------
  1. Paste the single script block below just before the closing body
     tag (self-contained: styles, brand SVGs and logic are inline; the
     Nersans font is picked up from the page when it is loaded there).

  2. In the quiz's click handler, replace the placeholder branch

        if(e.target.closest('[data-book]')){
          qstate.booked = true;
          renderQuiz();
          return;
        }

     with

        if(e.target.closest('[data-book]')){
          if(window.gmsOpenBooking) gmsOpenBooking();
          return;
        }

  Notes
  -----
  - Endpoints are CORS-allowlisted for goodmoves-finder.vercel.app.
  - GET /api/classes?date=YYYY-MM-DD for live availability; booking
    POSTs to /api/book-first-class. No secrets in the page.
  - Server-side: new-customers-only identity gates, rate limiting,
    honeypot, idempotent one-mat-per-class booking.
  - Tracking is consent-gated (gms_consent); nothing fires without
    opt-in, on the returning-customer path, or on the honeypot path.
  =====================================================================
-->

  /* ---------- helpers ---------- */
  function consented(){
    try{ return localStorage.getItem('gms_consent') === 'granted'; }catch(e){ return false; }
  }
  function eventId(prefix){
    return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,10);
  }
  function apiFetch(path, opts){
    var chain = Promise.reject();
    API_BASES.forEach(function(base){
      chain = chain.catch(function(){ return fetch(base + path, opts); });
    });
    return chain;
  }
  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function isoPlus(days){
    var d = new Date(); d.setDate(d.getDate()+days);
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }
  function parseISO(iso){ var p = iso.split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
  function longDate(iso){
    var d = parseISO(iso), l = lang();
    return l==='de' ? (WD.de[d.getDay()]+', '+d.getDate()+'. '+MO.de[d.getMonth()])
                    : (WD.en[d.getDay()]+', '+d.getDate()+' '+MO.en[d.getMonth()]);
  }
  function scarcityLabel(n){
    return lang()==='de' ? (n===1?'nur noch 1 Platz':'nur noch '+n+' Plätze')
                         : (n===1?'only 1 spot left':'only '+n+' spots left');
  }
  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  /* class names like "Pilates Slider Burn (EN)" → { nm, tag } */
  function splitTag(name){
    var m = /^(.*)\s\((EN|DE)\)\s*$/.exec(name || '');
    return m ? { nm:m[1], tag:m[2] } : { nm:(name||''), tag:'' };
  }
  function icsHref(slot){
    var d = parseISO(slot.date), p = slot.time.split(':');
    var s = new Date(d.getFullYear(), d.getMonth(), d.getDate(), +p[0], +p[1]);
    var e = new Date(s.getTime() + 55*60000);
    function z(x){ return x.getFullYear()+pad(x.getMonth()+1)+pad(x.getDate())+'T'+pad(x.getHours())+pad(x.getMinutes())+'00'; }
    var ics = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Good Moves//Booking//EN','BEGIN:VEVENT',
      'DTSTART:'+z(s),'DTEND:'+z(e),'SUMMARY:Good Moves — '+splitTag(slot.className).nm,
      'DESCRIPTION:Your free first class'+(slot.teacher?(' with '+slot.teacher):'')+'. Come 10 minutes early.',
      'LOCATION:Immanuelkirchstraße 24\\, 10405 Berlin','END:VEVENT','END:VCALENDAR'].join('\r\n');
    return 'data:text/calendar;charset=utf-8,'+encodeURIComponent(ics);
  }

    var cards=''; for(var j=0;j<5;j++) cards+='<div class="gmsbk-skelcard"></div>';
    shell('<h1 class="gmsbk-h1 gmsbk-display">'+t.schedTitle+'</h1>'
      + '<p class="gmsbk-sub">'+t.schedSub+'</p>'
      + '<div class="gmsbk-eyebrow">'+t.daysLabel+'</div>'
      + '<div class="gmsbk-skelrow">'+chips+'</div>'
      + '<div class="gmsbk-loadrow"><span class="gmsbk-spin"></span>'+t.loadingLabel+'</div>'
      + '<div style="display:flex;flex-direction:column;gap:10px;">'+cards+'</div>');
  }

  function dayChipsHTML(){
    var t = T(), l = lang();
    return S.dayKeys.map(function(d, i){
      var dt = parseISO(d), open = dayOpen(d), sel = d===S.currentDay;
      return '<button type="button" class="gmsbk-day" role="tab" data-day="'+d+'"'
        + ' aria-selected="'+sel+'"' + (open?'':' disabled')
        + ' aria-label="'+(i===0?t.today:WD[l][dt.getDay()])+' '+dt.getDate()+(open?'':' — '+t.fullLabel)+'">'
        + '<span class="wd">'+(i===0?t.today:WD[l][dt.getDay()])+'</span>'
        + '<span class="dn">'+dt.getDate()+'</span>'
        + '<span class="mini">'+(open?'':t.fullMini)+'</span>'
        + '</button>';
    }).join('');
  }

  function renderSchedule(){
    currentView='schedule';
    var t = T();
    var list = S.byDay[S.currentDay]||[];
    var anyOpen = dayOpen(S.currentDay);
    var body = '<h1 class="gmsbk-h1 gmsbk-display">'+t.schedTitle+'</h1>'
      + '<p class="gmsbk-sub">'+t.schedSub+'</p>'
      + '<div class="gmsbk-eyebrow">'+t.daysLabel+'</div>'
      + '<div class="gmsbk-days" role="tablist">'+dayChipsHTML()+'</div>';

    if(!anyOpen){
      var nd = nextOpenDay(S.currentDay);
      var ndt = nd ? parseISO(nd) : null;
      var ndLabel = nd ? ((S.dayKeys.indexOf(nd)===0?t.today:WD[lang()][ndt.getDay()])+' '+ndt.getDate()) : '';
      var cta = lang()==='de' ? (ndLabel+' ansehen') : ('See '+ndLabel);
      body += '<div class="gmsbk-emptywrap">'
        + '<div class="gmsbk-emptyico"><img class="blob" src="'+BLOB_BEIGE2+'" alt=""/><div class="disc">'+SVG.cal+'</div></div>'
        + '<div class="gmsbk-display" style="font-size:22px;color:#000044;margin-bottom:8px;">'+t.emptyTitle+'</div>'
        + '<p class="gmsbk-sub" style="margin:0 auto 18px;max-width:34ch;text-align:center;">'+t.emptyPre+longDate(S.currentDay)+t.emptyPost+'</p>'
        + (nd ? '<button type="button" class="gmsbk-btn" data-jump="'+nd+'">'+cta+' &#8594;</button>' : '')
        + '</div>';
    } else {
      body += '<div class="gmsbk-slots">'
        + list.map(function(ix){
            var s = S.slots[ix], st = splitTag(s.className);
            var full = s.soldOut || s.spotsLeft<=0;
            var scarce = !full && s.spotsLeft<=3;
            return '<button type="button" class="gmsbk-slot" data-ix="'+ix+'"'+(full?' disabled':'')
              + ' aria-label="'+esc(s.time+' '+st.nm+(s.teacher?(' '+t.withWord+' '+s.teacher):''))+(full?' — '+t.fullLabel:(scarce?' — '+scarcityLabel(s.spotsLeft):''))+'">'
              + '<span class="tm">'+s.time+'</span>'
              + '<span class="nm">'+esc(st.nm)+'</span>'
              + '<span class="sub">'+(s.teacher?(t.withWord+' '+esc(s.teacher)):'')
              +   (st.tag?('<span class="tag">'+st.tag+'</span>'):'')+'</span>'
              + (scarce?('<div style="margin-top:7px;"><span class="left">'+scarcityLabel(s.spotsLeft)+'</span></div>'):'')
              + (full?('<div style="margin-top:7px;"><span class="fullpill">'+t.fullLabel+'</span></div>'):'')
              + (!full?('<span class="pick">&#8594;</span>'):'')
              + '</button>';
          }).join('')
        + '</div>';
    }
    shell(body);
    overlay.querySelectorAll('[data-day]').forEach(function(b){
      b.addEventListener('click', function(){
        if(b.disabled) return;
        S.currentDay = b.dataset.day;
        renderSchedule();
      });
    });
    var jump = overlay.querySelector('[data-jump]');
    if(jump) jump.addEventListener('click', function(){ S.currentDay = jump.dataset.jump; renderSchedule(); });
    overlay.querySelectorAll('[data-ix]').forEach(function(b){
      b.addEventListener('click', function(){
        if(b.disabled) return;
        S.chosen = S.slots[Number(b.dataset.ix)];
        renderRegister(S.chosen, null);
      });
    });
  }

  function chosenHTML(slot, withEyebrow){
    var t = T(), st = splitTag(slot.className);
    return '<div class="gmsbk-chosen">'
      + (withEyebrow?('<div class="eyebrow">'+t.yourClass+'</div>'):'')
      + '<div class="tmn"><span class="tm gmsbk-display">'+slot.time+'</span><span class="nm">'+esc(st.nm)+'</span></div>'
      + '<div class="dt">'+longDate(slot.date)+(slot.teacher?(' · '+t.withWord+' '+esc(slot.teacher)):'')+'</div>'
      + '</div>';
  }

  /* sub: null | {kind:'returning'} | {kind:'error', msg} | {kind:'validation', errs, vals} */
  function renderRegister(slot, sub){
    currentView='register';
    var t = T();
    var vals = (sub && sub.vals) || { name:'', email:'', phone:'' };
    var errs = (sub && sub.kind==='validation') ? sub.errs : {};
    var body = '<button type="button" class="gmsbk-back" data-back="1">&#8592; '+t.backToClasses+'</button>'
      + chosenHTML(slot, true);

    if(sub && sub.kind==='returning'){
      body += '<div class="gmsbk-return">'
        + '<img class="blob" src="'+BLOB_BEIGE+'" alt=""/>'
        + '<div class="in">'
        + '<div class="eyebrow">'+t.returnEyebrow+'</div>'
        + '<p>'+t.returnMsg+'</p>'
        + '<div class="btns">'
        + '<a class="prim" href="'+MINDBODY_URL+'" target="_blank" rel="noopener">'+t.returnMindbody+'</a>'
        + '<a class="sec" href="mailto:hello@goodmovesstudio.com">'+t.returnMessage+'</a>'
        + '</div></div></div>';
      shell(body);
      overlay.querySelector('[data-back]').addEventListener('click', function(){ renderSchedule(); });
      return;
    }

    body += '<p class="gmsbk-reassure">'+SVG.check+'<span>'+t.reassure+'</span></p>';
    if(sub && sub.kind==='error'){
      body += '<div class="gmsbk-banner">'+SVG.warn18
        + '<div style="flex:1;"><div class="bt">'+esc(sub.msg||t.genericErr)+'</div>'
        + '<button type="button" class="retry" data-retry="1">'+t.tryAgain+'</button></div></div>';
    }
    if(Object.keys(errs).length){
      body += '<div class="gmsbk-errsum">'+SVG.warn+' '+t.errSummary+'</div>';
    }
    function field(id, key, type, ac){
      return '<div><label for="gmbk-'+key+'">'+t['lbl'+id]+'</label>'
        + '<input id="gmbk-'+key+'" name="'+key+'" type="'+type+'" autocomplete="'+ac+'" maxlength="'+(key==='email'?254:(key==='name'?100:20))+'"'
        + ' placeholder="'+t['ph'+id]+'" value="'+esc(vals[key]||'')+'" aria-invalid="'+(errs[key]?'true':'false')+'">'
        + (errs[key]?('<div class="gmsbk-ferr">&#9888; '+errs[key]+'</div>'):'')
        + '</div>';
    }
    body += '<form novalidate>'
      + '<div class="gmsbk-fields">'
      + field('Name','name','text','name')
      + field('Email','email','email','email')
      + field('Phone','phone','tel','tel')
      + '</div>'
      + '<div class="gmsbk-hp" aria-hidden="true"><label>Website</label><input name="website" tabindex="-1" autocomplete="off"></div>'
      + '<button type="submit" class="gmsbk-submit">'+t.submit+'</button>'
      + '<div class="gmsbk-nocard">'+t.noCard+'</div>'
      + '</form>';
    shell(body);
    overlay.querySelector('[data-back]').addEventListener('click', function(){ renderSchedule(); });
    var retry = overlay.querySelector('[data-retry]');
    var form = overlay.querySelector('form');
    function currentVals(){
      return { name:form.name.value, email:form.email.value, phone:form.phone.value, website:form.website?form.website.value:'' };
    }
    if(retry) retry.addEventListener('click', function(){ submitBooking(slot, currentVals()); });
    form.addEventListener('submit', function(e){
      e.preventDefault();
      submitBooking(slot, currentVals());
    });
  }

  function validate(v){
    var t = T(), e = {};
    if(!v.name || !v.name.trim()) e.name = t.errName;
    if(!v.email || !v.email.trim()) e.email = t.errEmailEmpty;
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.email.trim())) e.email = t.errEmailBad;
    if(!v.phone || v.phone.replace(/\D/g,'').length < 6) e.phone = t.errPhone;
    return e;
  }

  function submitBooking(slot, v){
    var t = T();
    var errs = validate(v);
    if(Object.keys(errs).length){
      renderRegister(slot, {kind:'validation', errs:errs, vals:v});
      return;
    }
    var btn = overlay.querySelector('.gmsbk-submit');
    if(btn) btn.disabled = true;
    var leadId = eventId('lead');
    apiFetch('/api/book-first-class', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name:v.name.trim(), email:v.email.trim(), phone:v.phone.trim(),
        classId:slot.classId, date:slot.date, time:slot.time,
        className:slot.className, teacher:slot.teacher,
        website:v.website||'', locale:lang(),
        leadEventId:leadId, metaConsent:consented()
      })
    }).then(function(r){ return r.json().then(function(d){ return {ok:r.ok, status:r.status, data:d}; }); })
    .then(function(res){
      if(res.data && res.data.code === 'not_eligible'){
        renderRegister(slot, {kind:'returning', vals:v});
        return;
      }
      if(res.status === 429){
        renderRegister(slot, {kind:'error', msg:t.rateErr, vals:v});
        return;
      }
      if(!res.ok || !res.data.ok) throw new Error('booking failed');
      if(window.gmsTrack && !(v.website)) gmsTrack('Lead', {value:0, currency:'EUR'}, leadId);
      S.lastDone = res.data;
      S.lastName = v.name;
      renderDone(res.data);
    })
    .catch(function(){
      renderRegister(slot, {kind:'error', msg:t.genericErr, vals:v});
    });
  }

  function renderDone(data){
    currentView='done';
    var t = T();
    var b = data.booked;
    var firstName = (S.lastName||'').trim().split(/\s+/)[0]||'';
    var title = b ? (firstName ? (t.doneTitlePre+esc(firstName)+t.doneTitlePost) : t.doneTitle) : t.pendingTitle;
    var slotForCal = b ? { className:b.className, date:b.date, time:b.time, teacher:b.teacher } : null;
    var body = '<div class="gmsbk-celebrate">'
      + '<img class="blob" src="'+BLOB_TERRA+'" alt=""/>'
      + '<div class="in">'
      + '<div class="ringwrap"><span class="ring" aria-hidden="true"></span><div class="disc">'+SVG.bigcheck+'</div></div>'
      + '<h1 class="gmsbk-display">'+title+'</h1>'
      + '</div></div>';
    if(b){
      var st = splitTag(b.className);
      body += '<div class="gmsbk-chosen" style="margin-top:16px;margin-bottom:0;">'
        + '<div class="tmn"><span class="tm gmsbk-display">'+b.time+'</span><span class="nm">'+esc(st.nm)+'</span></div>'
        + '<div class="dt">'+longDate(b.date)+(b.teacher?(' · '+t.withWord+' '+esc(b.teacher)):'')+'</div>'
        + '<a class="gmsbk-calline" href="'+icsHref(slotForCal)+'" download="good-moves-class.ics">'+SVG.caldl+' '+t.addCal+'</a>'
        + '</div>'
        + '<p class="gmsbk-confline">'+SVG.mail+'<span>'+t.doneConfirm+'</span></p>';
    } else {
      body += '<p class="gmsbk-confline">'+SVG.mail+'<span>'+t.pendingBody+'</span></p>';
    }
    body += '<div class="gmsbk-addr">'+SVG.pin
      + '<div style="flex:1;"><div class="lb">'+t.studioLabel+'</div>'
      + '<div class="ad">'+t.address+'</div>'
      + '<div class="ce">'+t.comeEarly+'</div>'
      + '<a href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent('Good Moves Studio, Immanuelkirchstraße 24, 10405 Berlin')+'" target="_blank" rel="noopener">'+t.directions+' &#8594;</a>'
      + '</div></div>'
      + '<div class="gmsbk-signoff gmsbk-display">'+t.signoff+'</div>'
      + '<button type="button" class="gmsbk-again" data-again="1">'+t.bookAnother+'</button>';
    shell(body);
    overlay.querySelector('[data-again]').addEventListener('click', function(){
      renderLoading();
      loadSlots().then(renderSchedule);
    });
  }

  /* ---------- entry ---------- */
  window.gmsOpenBooking = function(){
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    if(S.loaded){
      renderSchedule();
      loadSlots().then(function(){ if(currentView==='schedule') renderSchedule(); }); // refresh spots quietly
    } else {
      renderLoading();
      loadSlots().then(renderSchedule);
    }
  };
})();
</script>
